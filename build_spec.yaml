version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Check Files"
    command: |
      echo "Listing files"
      ls -l

  - type: Command
    name: "Compile Java Program"
    command: |
      javac AddTwoNumbers.java

  - type: Command
    name: "Run Java Program"
    command: |
      java AddTwoNumbers
